[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --strict-markers 
    --tb=short
markers =
    unit: Unit tests (no DB/network)
    integration: Integration tests (DB required)
    e2e: End-to-end tests
    slow: Slow tests (>1s)
